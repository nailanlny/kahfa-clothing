<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Kahfa</title>
  <meta name="description" content="Shop Kahfa's full collection of timeless minimalist clothing. T-shirts, jackets, trousers and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@200;300;400;500&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/shop.css">
</head>
<body>

  <main class="page-main">
    <div class="shop-header">
      <h1 class="shop-header__title">All Products</h1>
      <span class="shop-header__count" id="product-count">6 products</span>
    </div>

    <div class="filter-bar">
      <div class="filter-bar__left">
        <button class="filter-btn active" data-filter="all" onclick="filterProducts('all', this)">All</button>
        <button class="filter-btn" data-filter="tops" onclick="filterProducts('tops', this)">Tops</button>
        <button class="filter-btn" data-filter="bottoms" onclick="filterProducts('bottoms', this)">Bottoms</button>
        <button class="filter-btn" data-filter="outerwear" onclick="filterProducts('outerwear', this)">Outerwear</button>
      </div>
      <select class="sort-select" id="sort-select" onchange="sortProducts(this.value)">
        <option value="default">Sort: Featured</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="name-asc">Name: A–Z</option>
      </select>
    </div>

    <div class="product-grid" id="product-grid"></div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/shop.js"></script>
</body>
</html>
